name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o local-stt-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/local-stt/

      - uses: actions/upload-artifact@v4
        with:
          name: local-stt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: local-stt-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            local-stt-linux-amd64/local-stt-linux-amd64
            local-stt-linux-arm64/local-stt-linux-arm64
